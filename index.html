<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Defender - Arcade Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        canvas {
            border: 3px solid #333;
            border-radius: 8px;
            background: #000;
            box-shadow: 0 0 30px rgba(0, 150, 255, 0.3);
        }
        
        #hud {
            display: flex;
            justify-content: space-between;
            width: 800px;
            padding: 10px 0;
            color: #fff;
            font-size: 16px;
        }
        
        #hud .score { color: #00ff88; }
        #hud .lives { color: #ff4444; }
        #hud .level { color: #ffaa00; }
        #hud .high-score { color: #ffdd00; }
        
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            z-index: 10;
        }
        
        #overlay h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ff88;
            letter-spacing: 3px;
        }
        
        #overlay p {
            font-size: 18px;
            margin-bottom: 10px;
            color: #aaa;
        }
        
        #overlay .controls {
            margin: 20px 0;
            text-align: center;
            line-height: 2;
        }
        
        #overlay .controls kbd {
            background: #333;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid #555;
            font-family: monospace;
            color: #ffdd00;
        }
        
        .btn {
            margin-top: 20px;
            padding: 15px 50px;
            font-size: 20px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .btn:hover {
            background: #00cc6a;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        
        .hidden {
            display: none !important;
        }
        
        #final-score {
            font-size: 24px;
            color: #00ff88;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="hud">
            <span class="score">Score: <span id="score">0</span></span>
            <span class="high-score">Best: <span id="high-score">0</span></span>
            <span class="level">Level: <span id="level">1</span></span>
            <span class="lives">Lives: <span id="lives">3</span></span>
        </div>
        <canvas id="game" width="800" height="600"></canvas>
        <div id="overlay">
            <h1>SPACE DEFENDER</h1>
            <div id="start-screen">
                <p class="controls">
                    <kbd>←</kbd> <kbd>→</kbd> or <kbd>A</kbd> <kbd>D</kbd> to move<br>
                    <kbd>SPACE</kbd> to shoot<br>
                    <kbd>P</kbd> to pause
                </p>
                <button class="btn" id="start-btn">Start Game</button>
            </div>
            <div id="game-over-screen" class="hidden">
                <p>GAME OVER</p>
                <p id="final-score">Score: 0</p>
                <button class="btn" id="restart-btn">Play Again</button>
            </div>
            <div id="pause-screen" class="hidden">
                <p>PAUSED</p>
                <p>Press <kbd>P</kbd> to resume</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const pauseScreen = document.getElementById('pause-screen');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const levelEl = document.getElementById('level');
        const livesEl = document.getElementById('lives');
        const finalScoreEl = document.getElementById('final-score');
        
        let highScore = parseInt(localStorage.getItem('spaceDefenderHighScore')) || 0;
        highScoreEl.textContent = highScore;
        
        // Game state
        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let lives = 3;
        let level = 1;
        let frameCount = 0;
        
        // Input
        const keys = {};
        
        // Player
        const player = {
            x: 400,
            y: 540,
            width: 40,
            height: 40,
            speed: 6,
            color: '#00ff88',
            shootCooldown: 0,
            shootDelay: 12,
            invincible: 0
        };
        
        // Bullets
        let bullets = [];
        
        // Enemies
        let enemies = [];
        
        // Enemy bullets
        let enemyBullets = [];
        
        // Stars background
        const stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * 800,
                y: Math.random() * 600,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 1.5 + 0.2,
                brightness: Math.random()
            });
        }
        
        // Particles
        let particles = [];
        
        // Power-ups
        let powerUps = [];
        
        // Enemy types
        const enemyTypes = {
            basic: { color: '#ff4444', hp: 1, speed: 2, score: 10, size: 30, shootChance: 0.002 },
            fast: { color: '#ff8800', hp: 1, speed: 4, score: 20, size: 25, shootChance: 0.001 },
            tank: { color: '#aa44ff', hp: 3, speed: 1, score: 30, size: 40, shootChance: 0.003 },
            shooter: { color: '#ff0066', hp: 2, speed: 1.5, score: 40, size: 32, shootChance: 0.008 }
        };
        
        function createEnemy() {
            const types = Object.keys(enemyTypes);
            const typeName = types[Math.floor(Math.random() * Math.min(types.length, level + 1))];
            const type = enemyTypes[typeName];
            
            return {
                x: Math.random() * (760) + 20,
                y: -50,
                ...type,
                type: typeName,
                maxHp: type.hp,
                shootTimer: 0
            };
        }
        
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                const speed = Math.random() * 4 + 2;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 30,
                    maxLife: 30,
                    color,
                    size: Math.random() * 3 + 1
                });
            }
        }
        
        function createPowerUp(x, y) {
            if (Math.random() < 0.15) {
                const types = ['rapid', 'spread', 'shield', 'life'];
                const type = types[Math.floor(Math.random() * types.length)];
                powerUps.push({
                    x, y,
                    type,
                    size: 20,
                    speed: 2,
                    life: 300
                });
            }
        }
        
        let powerUpActive = null;
        let powerUpTimer = 0;
        
        function update() {
            if (!gameRunning || gamePaused) return;
            
            frameCount++;
            
            // Player movement
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                player.x = Math.max(20, player.x - player.speed);
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                player.x = Math.min(780, player.x + player.speed);
            }
            
            // Shooting
            player.shootCooldown--;
            if (keys[' '] && player.shootCooldown <= 0) {
                if (powerUpActive === 'spread') {
                    bullets.push({ x: player.x, y: player.y - 20, vy: -8, vx: 0, color: '#00ff88' });
                    bullets.push({ x: player.x, y: player.y - 20, vy: -7, vx: -2, color: '#00ff88' });
                    bullets.push({ x: player.x, y: player.y - 20, vy: -7, vx: 2, color: '#00ff88' });
                } else if (powerUpActive === 'rapid') {
                    bullets.push({ x: player.x, y: player.y - 20, vy: -10, vx: 0, color: '#00ffcc' });
                    player.shootCooldown = 5;
                } else {
                    bullets.push({ x: player.x, y: player.y - 20, vy: -8, vx: 0, color: '#00ff88' });
                }
                if (powerUpActive !== 'rapid') {
                    player.shootCooldown = player.shootDelay;
                }
            }
            
            // Update power-up timer
            if (powerUpActive && powerUpTimer > 0) {
                powerUpTimer--;
                if (powerUpTimer <= 0) {
                    powerUpActive = null;
                }
            }
            
            // Update bullets
            bullets = bullets.filter(b => {
                b.y += b.vy;
                b.x += b.vx || 0;
                return b.y > -10 && b.y < 610 && b.x > -10 && b.x < 810;
            });
            
            // Spawn enemies
            const spawnRate = Math.max(30, 120 - level * 10);
            if (frameCount % spawnRate === 0) {
                enemies.push(createEnemy());
            }
            
            // Update enemies
            enemies.forEach(e => {
                e.y += e.speed;
                e.x += Math.sin(e.y / 50) * 1.5;
                
                // Enemy shooting
                if (Math.random() < e.shootChance) {
                    enemyBullets.push({
                        x: e.x,
                        y: e.y + e.size / 2,
                        vy: 5 + level * 0.3,
                        color: '#ff4444'
                    });
                }
            });
            
            enemies = enemies.filter(e => e.y < 650 && e.x > -50 && e.x < 850);
            
            // Update enemy bullets
            enemyBullets = enemyBullets.filter(b => {
                b.y += b.vy;
                return b.y < 650;
            });
            
            // Update power-ups
            powerUps = powerUps.filter(p => {
                p.y += p.speed;
                p.life--;
                return p.y < 650 && p.life > 0;
            });
            
            // Collision: bullets vs enemies
            bullets.forEach(b => {
                enemies.forEach(e => {
                    const dx = b.x - e.x;
                    const dy = b.y - e.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < e.size / 2 + 5) {
                        e.hp--;
                        b.hit = true;
                        if (e.hp <= 0) {
                            score += e.score;
                            createParticles(e.x, e.y, e.color, 15);
                            createPowerUp(e.x, e.y);
                            e.dead = true;
                        } else {
                            createParticles(b.x, b.y, '#fff', 3);
                        }
                    }
                });
            });
            
            bullets = bullets.filter(b => !b.hit);
            enemies = enemies.filter(e => !e.dead);
            
            // Collision: player vs enemies
            if (player.invincible <= 0) {
                enemies.forEach(e => {
                    const dx = player.x - e.x;
                    const dy = player.y - e.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < e.size / 2 + 20) {
                        e.dead = true;
                        createParticles(e.x, e.y, e.color, 15);
                        createParticles(player.x, player.y, '#00ff88', 20);
                        lives--;
                        player.invincible = 120;
                        score = Math.max(0, score - 50);
                    }
                });
                
                // Collision: player vs enemy bullets
                enemyBullets.forEach(b => {
                    const dx = player.x - b.x;
                    const dy = player.y - b.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 25) {
                        b.hit = true;
                        createParticles(player.x, player.y, '#00ff88', 20);
                        lives--;
                        player.invincible = 120;
                        score = Math.max(0, score - 50);
                    }
                });
                
                enemyBullets = enemyBullets.filter(b => !b.hit);
            } else {
                player.invincible--;
            }
            
            enemies = enemies.filter(e => !e.dead);
            
            // Collision: player vs power-ups
            powerUps = powerUps.filter(p => {
                const dx = player.x - p.x;
                const dy = player.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 30) {
                    if (p.type === 'life') {
                        lives = Math.min(5, lives + 1);
                        createParticles(p.x, p.y, '#ffdd00', 10);
                    } else {
                        powerUpActive = p.type;
                        powerUpTimer = 300;
                        createParticles(p.x, p.y, '#00ccff', 10);
                    }
                    return false;
                }
                return true;
            });
            
            // Update particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.95;
                p.vy *= 0.95;
                p.life--;
                return p.life > 0;
            });
            
            // Update stars
            stars.forEach(s => {
                s.y += s.speed * (gamePaused ? 0.1 : 1);
                if (s.y > 600) {
                    s.y = 0;
                    s.x = Math.random() * 800;
                }
            });
            
            // Level up
            if (score >= level * 200) {
                level++;
                createParticles(player.x, player.y, '#ffdd00', 30);
            }
            
            // Game over
            if (lives <= 0) {
                gameOver();
            }
            
            // Update HUD
            scoreEl.textContent = score;
            levelEl.textContent = level;
            livesEl.textContent = lives;
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 800, 600);
            
            // Draw stars
            stars.forEach(s => {
                ctx.globalAlpha = s.brightness * (0.5 + Math.sin(frameCount * 0.05 + s.x) * 0.5);
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            
            // Draw particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            
            // Draw power-ups
            powerUps.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(frameCount * 0.05);
                
                const colors = {
                    rapid: '#00ccff',
                    spread: '#ffaa00',
                    shield: '#44ff44',
                    life: '#ffdd00'
                };
                const labels = { rapid: 'R', spread: 'S', shield: 'SH', life: '♥' };
                
                ctx.fillStyle = colors[p.type];
                ctx.beginPath();
                ctx.moveTo(0, -p.size / 2);
                for (let i = 1; i < 6; i++) {
                    const angle = (Math.PI * 2 / 6) * i - Math.PI / 2;
                    ctx.lineTo(Math.cos(angle) * p.size / 2, Math.sin(angle) * p.size / 2);
                }
                ctx.closePath();
                ctx.fill();
                
                ctx.fillStyle = '#000';
                ctx.font = 'bold 14px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(labels[p.type], 0, 0);
                
                ctx.restore();
            });
            
            // Draw player
            ctx.save();
            ctx.translate(player.x, player.y);
            
            if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }
            
            // Ship body
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(0, -20);
            ctx.lineTo(-18, 15);
            ctx.lineTo(-10, 15);
            ctx.lineTo(-5, 10);
            ctx.lineTo(5, 10);
            ctx.lineTo(10, 15);
            ctx.lineTo(18, 15);
            ctx.closePath();
            ctx.fill();
            
            // Cockpit
            ctx.fillStyle = '#00ccff';
            ctx.beginPath();
            ctx.ellipse(0, -2, 6, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Engine glow
            ctx.fillStyle = '#ff6600';
            ctx.globalAlpha = 0.7 + Math.sin(frameCount * 0.3) * 0.3;
            ctx.beginPath();
            ctx.moveTo(-8, 15);
            ctx.lineTo(0, 30 + Math.sin(frameCount * 0.3) * 5);
            ctx.lineTo(8, 15);
            ctx.closePath();
            ctx.fill();
            
            ctx.globalAlpha = 1;
            
            // Shield effect
            if (powerUpActive === 'shield') {
                ctx.strokeStyle = '#44ff44';
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.5 + Math.sin(frameCount * 0.1) * 0.3;
                ctx.beginPath();
                ctx.arc(0, 0, 35, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            ctx.restore();
            
            // Draw bullets
            bullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.shadowColor = b.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
            
            // Draw enemy bullets
            enemyBullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.shadowColor = b.color;
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
            
            // Draw enemies
            enemies.forEach(e => {
                ctx.save();
                ctx.translate(e.x, e.y);
                
                ctx.fillStyle = e.color;
                ctx.shadowColor = e.color;
                ctx.shadowBlur = 15;
                
                if (e.type === 'basic') {
                    ctx.beginPath();
                    ctx.moveTo(0, e.size / 2);
                    ctx.lineTo(-e.size / 2, -e.size / 2);
                    ctx.lineTo(e.size / 2, -e.size / 2);
                    ctx.closePath();
                    ctx.fill();
                } else if (e.type === 'fast') {
                    ctx.beginPath();
                    ctx.moveTo(0, e.size / 2);
                    ctx.lineTo(-e.size / 3, -e.size / 2);
                    ctx.lineTo(e.size / 3, -e.size / 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#ffcc00';
                    ctx.beginPath();
                    ctx.arc(0, -e.size / 4, 4, 0, Math.PI * 2);
                    ctx.fill();
                } else if (e.type === 'tank') {
                    ctx.fillRect(-e.size / 2, -e.size / 2, e.size, e.size);
                    ctx.fillStyle = '#ff00ff';
                    ctx.fillRect(-e.size / 4, -e.size / 4, e.size / 2, e.size / 2);
                } else if (e.type === 'shooter') {
                    ctx.beginPath();
                    ctx.arc(0, 0, e.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ffcc00';
                    ctx.beginPath();
                    ctx.arc(0, 0, 8, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.shadowBlur = 0;
                
                // HP bar
                if (e.hp < e.maxHp) {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(-e.size / 2, -e.size / 2 - 8, e.size, 4);
                    ctx.fillStyle = '#ff4444';
                    ctx.fillRect(-e.size / 2, -e.size / 2 - 8, e.size * (e.hp / e.maxHp), 4);
                }
                
                ctx.restore();
            });
            
            // Power-up indicator
            if (powerUpActive) {
                const labels = { rapid: 'RAPID FIRE', spread: 'SPREAD SHOT', shield: 'SHIELD' };
                ctx.fillStyle = '#00ccff';
                ctx.font = 'bold 16px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(`${labels[powerUpActive]} ${Math.ceil(powerUpTimer / 60)}s`, 400, 580);
                
                ctx.fillStyle = '#00ccff';
                ctx.fillRect(300, 585, 200 * (powerUpTimer / 300), 5);
            }
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            score = 0;
            lives = 3;
            level = 1;
            frameCount = 0;
            player.x = 400;
            player.y = 540;
            player.invincible = 0;
            bullets = [];
            enemies = [];
            enemyBullets = [];
            particles = [];
            powerUps = [];
            powerUpActive = null;
            powerUpTimer = 0;
            
            gameRunning = true;
            gamePaused = false;
            overlay.classList.add('hidden');
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            pauseScreen.classList.add('hidden');
            
            scoreEl.textContent = score;
            levelEl.textContent = level;
            livesEl.textContent = lives;
        }
        
        function gameOver() {
            gameRunning = false;
            overlay.classList.remove('hidden');
            gameOverScreen.classList.remove('hidden');
            finalScoreEl.textContent = `Score: ${score}`;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('spaceDefenderHighScore', highScore);
                highScoreEl.textContent = highScore;
                finalScoreEl.textContent += ' (NEW BEST!)';
            }
        }
        
        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            if (gamePaused) {
                overlay.classList.remove('hidden');
                pauseScreen.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
                pauseScreen.classList.add('hidden');
            }
        }
        
        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (e.key === 'p' || e.key === 'P') {
                togglePause();
            }
            
            if (e.key === ' ' && !gameRunning && !overlay.classList.contains('hidden')) {
                e.preventDefault();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);
        
        // Start loop
        gameLoop();
    </script>
</body>
</html>
